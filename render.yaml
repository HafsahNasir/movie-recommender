services:
  - type: web
    name: movie-recommender-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATA_DIR
        value: ../data
